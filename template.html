<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>
    <style>
        @page { size: A4; margin: 15mm; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; direction: rtl; background: white; color: black; margin: 0; padding: 0; font-size: 14pt; line-height: 1.6; }
        .flex-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px double black; padding-bottom: 8px; margin-bottom: 30px; }
        .header-item { flex: 1; }
        .header-item.right { text-align: right; font-size: 11pt; }
        .header-item.center { text-align: center; }
        .header-item.left { text-align: left; font-size: 11pt; }
        h1 { font-size: 18pt; margin: 0 0 5px 0; }
        h2 { font-size: 14pt; margin: 0; font-weight: normal; }
        .content-section { margin-top: 10px; }
        .question-box { margin-bottom: 30px; page-break-inside: avoid; }
        h3 { font-size: 15pt; margin-bottom: 15px; color: #111; }
        .ten-frame-container { display: flex; gap: 20px; margin: 20px 0; }
        .ten-frame { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; border: 2.5px solid black; padding: 4px; background: #fff; width: 220px; }
        .cell { border: 1.5px solid black; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 18pt; }
        .clean-input { border: none; border-bottom: 1.5px dashed black; width: 70px; display: inline-block; text-align: center; }
    </style>
</head>
<body>
    <div class="flex-header">
        <div class="header-item right">
            <div>وزارة التربية والتعليم</div>
            <div>مديرية التربية والتعليم - طوباس</div>
            <div>مدرسة عاطوف الأساسية المختلطة</div>
        </div>
        <div class="header-item center">
            <h1>مبحث الرياضيات</h1>
            <h2>ورقة عمل: {{ title }}</h2>
        </div>
        <div class="header-item left">
            <div>الاسم: .......................................</div>
            <div>الصف: الأساسي</div>
            <div>التاريخ: .... / .... / ٢٠٢٦م</div>
        </div>
    </div>
    <div class="content-section">
        {{ content }}
    </div>
</body>
</html>
